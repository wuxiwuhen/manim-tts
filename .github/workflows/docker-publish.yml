# 在 GitHub 上构建镜像并发布到 GHCR (ghcr.io)
#
# 触发方式：
#   - push 到 main 分支：自动重建，产出 :latest 和 :sha-xxxxxx 两个标签
#   - 打 tag（如 v1, v1.2）：产出对应的版本标签，推荐用这个给 Daytona
#   - 手动：Actions 页面点 "Run workflow"
#
# 关键点：
#   - runner 是 ubuntu-latest，本身就是 linux/amd64，构建出来正是 Daytona 要的架构
#   - 用自带的 GITHUB_TOKEN 推 GHCR，无需额外配置 secret
name: build-and-publish-image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 镜像名自动等于 owner/repo，比如 ghcr.io/<你的用户名>/<仓库名>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 推送到 GHCR 必须给 packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag                 # 打 tag 时 -> :v1
            type=sha,format=short              # 始终 -> :sha-xxxxxx（Daytona 可用）
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64     # Daytona 云端只认 amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
